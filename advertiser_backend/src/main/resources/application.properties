spring.application.name=sampleApp

# PostgreSQL connection — values from environment variables
# Set DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD in your OS env vars
# For local dev, copy .env.example and follow instructions
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# JWT — 256-bit secret (min 32 chars for HS256)
# Generate one with: $env:JWT_SECRET=$(openssl rand -hex 32)
jwt.secret=${JWT_SECRET:MySuperSecretKeyForHS256AlgorithmThatIsAtLeast32Chars!!}
jwt.access-expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

# File upload
file.upload-dir=./uploads
